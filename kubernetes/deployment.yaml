apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: flask

  template:
    metadata:
      labels:
        app: flask

    spec:
      containers:
      - name: flask-container
        image: dharani3110/jenkins-demo:IMAGE_TAG
        imagePullPolicy: Always

        ports:
        - containerPort: 5000
